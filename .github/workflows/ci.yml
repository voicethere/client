name: CI

on:
  pull_request:
    branches: [main]
  push:
    tags: ["release/*"]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    if: github.event_name != 'push' || !startsWith(github.ref, 'refs/tags/release/')
    uses: ./.github/workflows/test.yml

  quality:
    if: startsWith(github.ref, 'refs/tags/release/')
    uses: ./.github/workflows/test.yml
    with:
      force_test: true

  publish:
    if: startsWith(github.ref, 'refs/tags/release/')
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          registry-url: https://registry.npmjs.org
          scope: "@voicethere"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Resolve release version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#release/}"
          if [ -z "$VERSION" ]; then
            echo "Could not parse version from tag: $GITHUB_REF_NAME" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing @voicethere/client@${VERSION}"

      - name: Set package version
        run: npm version "${{ steps.version.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Build publishable dist
        run: npm run build

      - name: Verify npm auth
        run: npm whoami

      - name: Configure npm registry auth
        run: echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > "$HOME/.npmrc"
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm
        run: npm publish --access public
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify package on registry
        run: bash scripts/ci/wait-for-npm-package.sh @voicethere/client "${{ steps.version.outputs.version }}"
        env:
          NPM_REGISTRY_VERIFY_ATTEMPTS: 24
          NPM_REGISTRY_VERIFY_SLEEP_SECONDS: 5
